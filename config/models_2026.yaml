# 2026 Q1 Model Lineup Configuration for Code-ORbench

models:
  anthropic:
    - id: "claude-4.6-opus"
      capabilities: ["anti-over-refusal-target"]
      description: "Anthropic's flagship model, known for high safety alignment but susceptible to over-refusal."
    - id: "claude-4.6-sonnet"
      capabilities: ["anti-over-refusal-target"]
      description: "Fast and intelligent, target evaluation."
    - id: "claude-3.5-sonnet"
      capabilities: ["anti-over-refusal-target"]
      description: "Previous generation Anthropic model for baseline."
  
  openai:
    - id: "gpt-5.3-codex-preview"
      capabilities: ["anti-over-refusal-target"]
      description: "OpenAI's latest specialized code model. Used as target."
    - id: "gpt-5.2-thinking"
      capabilities: ["anti-over-refusal-target", "llm-judge", "moderator"]
      description: "OpenAI's top reasoning model capable of CoT. Used as Judge and Moderator."
    - id: "gpt-4o"
      capabilities: ["anti-over-refusal-target"]
      description: "Previous generation GPT for baseline."

  google:
    - id: "gemini-3.1-pro-preview"
      capabilities: ["anti-over-refusal-target", "moderator"]
      description: "Google's reasoning powerhouse. Used as Moderator and target."
    - id: "gemini-1.5-pro"
      capabilities: ["anti-over-refusal-target"]
      description: "Previous generation Gemini for baseline."

  deepseek:
    - id: "deepseek-r1"
      capabilities: ["anti-over-refusal-target", "llm-judge", "reasoning"]
      description: "DeepSeek's heavy reasoning model. Emits <think> tags. Used as Judge."
    - id: "deepseek-v3.2"
      capabilities: ["anti-over-refusal-target"]
      description: "Latest generation DeepSeek model."
    - id: "deepseek-coder-v2"
      capabilities: ["anti-over-refusal-target"]
      description: "DeepSeek specialized code model."

  meta:
    - id: "llama-4-maverick"
      capabilities: ["anti-over-refusal-target", "moderator"]
      description: "Meta's most advanced reasoning model. Used as Moderator."
    - id: "llama-3.1-70b"
      capabilities: ["anti-over-refusal-target"]
      description: "Previous Meta open weight model."

  qwen:
    - id: "qwen-3.5-plus"
      capabilities: ["anti-over-refusal-target", "reasoning"]
      description: "Qwen's advanced reasoning model."
    - id: "qwen-2.5-coder-32b"
      capabilities: ["anti-over-refusal-target"]
      description: "Previous generation Qwen code model."

evaluation:
  judge_model: "deepseek-r1" # or gpt-5.2-thinking
  moderator_ensemble:
    - "gpt-5.2-thinking"
    - "llama-4-maverick"
    - "gemini-3.1-pro-preview"
  majority_vote_threshold: 0.66
